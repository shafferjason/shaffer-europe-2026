<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Things we noticed · Shaffers Abroad</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="paper">

  <a href="index.html" class="backLink">← back to the trip</a>

  <header class="noticedHead">
    <div class="noticedKicker">Index · the small finds</div>
    <h1 class="noticedTitle">Things we noticed</h1>
    <p class="noticedLede">A running ledger of the small things — one per day, more or less.</p>
  </header>

  <section id="noticedList" class="noticedList">
    <div class="noticedEmpty">Nothing noticed yet. We'll start adding entries on the road.</div>
  </section>

  <footer class="footer">
    <p class="handwritten">ours · May 2026</p>
  </footer>
</div>

<script src="data.js"></script>
<script>
(function(){
  const T = window.TRIP;
  if (!T || !T.days) return;
  const list = document.getElementById('noticedList');
  if (!list) return;

  const entries = T.days
    .filter(d => d.smallFind && d.smallFind.text)
    .map(d => ({ day: d, sf: d.smallFind }));

  if (!entries.length) return;  // keep empty-state

  list.innerHTML = entries.map(({day, sf}) => `
    <article class="noticedItem">
      <div class="noticedNumber">no. ${sf.number || '—'}</div>
      <div class="noticedBody">
        <div class="noticedMeta">${day.label} · ${day.city}</div>
        ${sf.label ? `<div class="noticedLabel">${sf.label}</div>` : ''}
        <div class="noticedText">${sf.text}</div>
      </div>
      ${sf.photo ? `<img class="noticedThumb" src="${sf.photo}" alt="${sf.label || ''}" />` : ''}
    </article>
  `).join('');
})();
</script>
</body>
</html>
