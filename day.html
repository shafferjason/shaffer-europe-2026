<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shaffers Abroad — day</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="paper">
  <a href="index.html" class="backLink">← back to the trip</a>
  <div id="dayMount"></div>
  <footer class="footer">
    <p class="handwritten">made with love · May 2026</p>
  </footer>
</div>
<script src="data.js"></script>
<script>
(function() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const T = window.TRIP;
  const day = T && T.days.find(d => d.id === id);
  const mount = document.getElementById('dayMount');
  if (!day) {
    mount.innerHTML = '<p style="text-align:center;font-style:italic;">Day not found.</p>';
    return;
  }

  const photoBlocks = (day.photos || []).map((p, i) => `
    <figure class="polaroid">
      <img src="${p}" alt="${day.city} photo ${i+1}" />
      <figcaption class="cap">${day.city}</figcaption>
    </figure>
  `).join('');

  // Small Find — only if text exists
  const sf = day.smallFind;
  const smallFindBlock = (sf && sf.text) ? `
    <section class="smallFind">
      <div class="smallFindNumber">Specimen no. ${sf.number || '—'}</div>
      <div class="smallFindKicker">a small find</div>
      ${sf.photo ? `<img class="smallFindPhoto" src="${sf.photo}" alt="${sf.label || ''}" />` : ''}
      ${sf.label ? `<div class="smallFindLabel">${sf.label}</div>` : ''}
      <div class="smallFindText">${sf.text}</div>
    </section>
  ` : '';

  // Postcard To — only if text exists
  const pc = day.postcardTo;
  const postcardBlock = (pc && pc.text) ? `
    <section class="postcardTo">
      <div class="postcardKicker">a postcard to —</div>
      <div class="postcardRecipient">${pc.to || ''}</div>
      <div class="postcardText">${pc.text}</div>
      <div class="postcardSignoff">${pc.signoff || '— J &amp; R'}</div>
    </section>
  ` : '';

  mount.innerHTML = `
    <div class="dayHero">
      <div class="day-kicker">${day.label} · ${day.kicker || ''}</div>
      <h1>${day.title || day.city}</h1>
      <div class="day-city">${day.flag || ''} ${day.city} · ${day.country || ''}</div>
      <div class="dayLedger" id="dayLedger"></div>
    </div>
    ${photoBlocks ? `<div class="photoStack">${photoBlocks}</div>` : ''}
    <div class="journal">
      ${day.journal ? day.journal.split('\n\n').map(p => `<p>${p}</p>`).join('') :
        `<p class="dim">No journal entry yet.</p>`}
    </div>
    ${smallFindBlock}
    ${postcardBlock}
  `;

  // ----- Weather ledger (Open-Meteo, free, no key) -----
  const coords = (T.coords || {})[day.id];
  if (coords && coords.lat) loadWeather(coords, day.date);

  function wmoLabel(code) {
    if (code === 0) return 'clear';
    if (code <= 3) return 'partly cloudy';
    if (code <= 48) return 'fog';
    if (code <= 55) return 'drizzle';
    if (code <= 65) return 'rain';
    if (code <= 75) return 'snow';
    if (code <= 82) return 'showers';
    if (code <= 99) return 'thunder';
    return '';
  }
  async function loadWeather(c, date) {
    const ledger = document.getElementById('dayLedger');
    if (!ledger) return;
    const today = new Date(); today.setHours(0,0,0,0);
    const target = new Date(date + 'T00:00:00');
    const isPast = target < today;
    const base = isPast
      ? 'https://archive-api.open-meteo.com/v1/archive'
      : 'https://api.open-meteo.com/v1/forecast';
    const url = `${base}?latitude=${c.lat}&longitude=${c.lng}&start_date=${date}&end_date=${date}&daily=temperature_2m_max,temperature_2m_min,weathercode&temperature_unit=fahrenheit&timezone=auto`;
    try {
      const r = await fetch(url);
      const j = await r.json();
      const d = j.daily;
      if (!d || !d.temperature_2m_max || d.temperature_2m_max[0] == null) return;
      const hi = Math.round(d.temperature_2m_max[0]);
      const lo = Math.round(d.temperature_2m_min[0]);
      const cond = wmoLabel(d.weathercode[0]);
      ledger.innerHTML = `
        <span class="ledgerItem">${hi}° / ${lo}°</span>
        ${cond ? `<span class="ledgerSep">·</span><span class="ledgerItem">${cond}</span>` : ''}
        <span class="ledgerSep">·</span>
        <span class="ledgerItem ledgerMuted">${c.where || ''}</span>
      `;
    } catch (e) { /* silently skip */ }
  }
})();
</script>
</body>
</html>
