<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logistics · Shaffers Abroad</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="paper">

  <a href="index.html" class="backLink">← back to the trip</a>

  <div id="gate" class="lockGate">
    <h2>Logistics</h2>
    <p>Reservations, confirmations, contacts. For Jason &amp; Rachel only.</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="off" />
    <button id="unlockBtn">Unlock</button>
    <div class="lockError" id="lockErr"></div>
  </div>

  <div id="panel" class="privatePanel">
    <h1 style="font-family:'Cormorant Garamond',serif;font-size:42px;margin:0 0 4px;">Logistics</h1>
    <p style="font-style:italic;color:var(--ink-soft);margin:0 0 20px;">Tap any phone number to dial. Tap any address to open in Maps.</p>

    <a href="https://shaffers-abroad.netlify.app/translate" target="_blank" rel="noopener"
       style="display:flex;align-items:center;gap:12px;text-decoration:none;background:var(--accent);color:#fff;padding:14px 18px;border-radius:12px;margin:0 0 28px;box-shadow:var(--shadow-soft);font-family:'Cormorant Garamond',serif;">
      <span style="font-size:26px;line-height:1;">🎙</span>
      <span>
        <span style="display:block;font-size:21px;font-weight:600;">Translator</span>
        <span style="display:block;font-size:15px;opacity:0.9;">Speak French, Spanish, or English — read it back translated</span>
      </span>
    </a>

    <section class="privateSection" id="cruiseBox"></section>
    <section class="privateSection" id="flightsBox"></section>
    <section class="privateSection" id="hotelsBox"></section>
    <section class="privateSection" id="toursBox"></section>
    <section class="privateSection" id="parkingBox"></section>
    <section class="privateSection" id="contactsBox"></section>
    <section class="privateSection" id="notesBox"></section>
  </div>

  <footer class="footer">
    <p class="handwritten">ours · May 2026</p>
  </footer>
</div>

<script src="data.js"></script>
<script src="update-check.js"></script>
<script src="lightbox.js"></script>
<script>
(function(){
  // Soft lock — change the password by editing the line below.
  const PASSWORD = '2026';

  const gate = document.getElementById('gate');
  const panel = document.getElementById('panel');
  const pw = document.getElementById('pw');
  const btn = document.getElementById('unlockBtn');
  const err = document.getElementById('lockErr');

  function unlock() {
    if (pw.value === PASSWORD) {
      sessionStorage.setItem('sa-unlocked', '1');
      gate.style.display = 'none';
      panel.classList.add('unlocked');
      render();
    } else {
      err.textContent = 'try again';
      pw.value = '';
      pw.focus();
    }
  }
  btn.addEventListener('click', unlock);
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  if (sessionStorage.getItem('sa-unlocked') === '1') {
    gate.style.display = 'none';
    panel.classList.add('unlocked');
    document.addEventListener('DOMContentLoaded', render);
  } else {
    setTimeout(() => pw.focus(), 100);
  }

  function tapPhone(num) {
    if (!num) return '';
    const clean = num.replace(/[^\d+]/g, '');
    return `<a class="pValue tap" href="tel:${clean}">${num}</a>`;
  }
  function tapAddress(addr) {
    if (!addr) return '';
    const q = encodeURIComponent(addr);
    return `<a class="pValue tap" href="https://maps.apple.com/?q=${q}" target="_blank">${addr}</a>`;
  }

  function row(label, value) {
    return `<div class="privateRow"><div class="pLabel">${label}</div><div class="pValue">${value}</div></div>`;
  }

  function render() {
    const P = (window.TRIP && window.TRIP.private) || {};

    // Cruise
    if (P.cruise) {
      const c = P.cruise;
      const ports = (c.portTimes || []).map(p => `<div style="font-size:15px;color:var(--ink);">• ${p}</div>`).join('');
      document.getElementById('cruiseBox').innerHTML = `
        <h3>🛳 MSC Opera · 8 nights</h3>
        ${row('Ship', c.ship)}
        ${row('Booking', `<strong>${c.booking}</strong>`)}
        ${row('Check-in', c.checkIn)}
        ${row('Board', c.boardDate)}
        ${row('Disembark', c.disembarkDate)}
        ${row('Stateroom', `<strong>${c.stateroom}</strong>`)}
        ${row('Dining', c.diningTime)}
        ${row('Assembly', c.assembly || '—')}
        ${row('Guest IDs', c.guestIds || '—')}
        ${row('Wi-Fi', c.wifi || '—')}
        ${row('App', c.app || '—')}
        ${ports ? `<div class="privateRow"><div class="pLabel">Ports</div><div>${ports}</div></div>` : ''}
      `;
    }

    // Flights
    if (P.flights && P.flights.length) {
      document.getElementById('flightsBox').innerHTML =
        `<h3>✈️ Flights</h3>` +
        P.flights.map(f => `
          <div class="privateRow">
            <div class="pLabel">${f.date}</div>
            <div class="pValue">
              <strong>${f.route}</strong><br>
              ${f.airline}<br>
              ${f.times}<br>
              ${f.seats ? `<span style="font-size:14px;color:var(--ink-soft);">${f.seats}</span><br>` : ''}
              <span style="font-size:14px;color:var(--ink-soft);">Confirmation: <strong>${f.confirmation}</strong></span>
            </div>
          </div>
        `).join('');
    }

    // Hotels
    if (P.hotels && P.hotels.length) {
      document.getElementById('hotelsBox').innerHTML =
        `<h3>🏨 Hotels</h3>` +
        P.hotels.map(h => `
          <div class="privateRow">
            <div class="pLabel">${h.date}</div>
            <div class="pValue">
              <strong>${h.name}</strong><br>
              ${tapAddress(h.city)}<br>
              ${tapPhone(h.phone)}<br>
              <span style="font-size:14px;color:var(--ink-soft);">Confirmation: <strong>${h.confirmation}</strong></span>
              ${h.notes ? `<br><span style="font-size:14px;color:var(--ink-soft);font-style:italic;">${h.notes}</span>` : ''}
            </div>
          </div>
        `).join('');
    }

    // Tours
    if (P.tours && P.tours.length) {
      document.getElementById('toursBox').innerHTML =
        `<h3>🎟 Tours &amp; excursions</h3>` +
        P.tours.map(t => `
          <div class="privateRow">
            <div class="pLabel">${t.date}</div>
            <div class="pValue">
              <strong>${t.name}</strong><br>
              <span style="font-size:14px;color:var(--ink-soft);">${t.operator || ''}</span><br>
              <span style="font-size:14px;color:var(--ink-soft);">Confirmation: <strong>${t.confirmation}</strong></span>
            </div>
          </div>
        `).join('');
    }

    // Parking
    if (P.parking) {
      const p = P.parking;
      document.getElementById('parkingBox').innerHTML = `
        <h3>🅿️ DFW Parking</h3>
        ${row('Where', p.where)}
        ${row('Confirmation', `<strong>${p.confirmation}</strong>`)}
        ${row('License plate', `<strong>${p.lpn}</strong>`)}
        ${row('In', p.start)}
        ${row('Out', p.end)}
        ${row('Total', p.total)}
        <div class="privateRow"><div class="pLabel">Plan</div><div style="font-size:15px;color:var(--ink);">${p.note}</div></div>
      `;
    }

    // Contacts
    if (P.contacts && P.contacts.length) {
      document.getElementById('contactsBox').innerHTML =
        `<h3>☎ Key contacts</h3>` +
        P.contacts.map(c => `
          <div class="privateRow"><div class="pLabel">${c.who}</div>
            <div>${tapPhone(c.phone)}</div>
          </div>
        `).join('');
    }

    // Notes
    if (P.notes) {
      document.getElementById('notesBox').innerHTML =
        `<h3>📝 Trip notes</h3>
         <p style="font-size:16px;line-height:1.7;color:var(--ink);">${P.notes}</p>`;
    }
  }
})();
</script>
</body>
</html>
