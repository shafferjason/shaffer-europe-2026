<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Translator · Shaffers Abroad</title>
<meta name="robots" content="noindex,nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
<style>
  .trWrap { max-width: 560px; margin: 0 auto; }
  .trLangRow { display: flex; gap: 8px; justify-content: center; margin: 4px 0 26px; flex-wrap: wrap; }
  .trLang {
    font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 600;
    padding: 8px 20px; border-radius: 999px; cursor: pointer;
    background: transparent; color: var(--ink-soft);
    border: 1.5px solid rgba(90, 79, 58, 0.35); transition: all 0.15s;
  }
  .trLang.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .trMicWrap { text-align: center; margin: 18px 0 8px; }
  .trMic {
    width: 116px; height: 116px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--accent); color: #fff; font-size: 44px; line-height: 1;
    box-shadow: var(--shadow); transition: transform 0.12s, background 0.2s;
  }
  .trMic:hover { transform: translateY(-2px); }
  .trMic.recording { background: #6e1f1f; animation: trPulse 1.2s ease-in-out infinite; }
  @keyframes trPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(138,43,43,0.5); } 50% { box-shadow: 0 0 0 16px rgba(138,43,43,0); } }
  .trHint { text-align: center; color: var(--ink-soft); font-style: italic; font-size: 16px; margin: 12px 0 0; min-height: 22px; }
  .trCard {
    background: rgba(255,255,255,0.55); border: 1px solid rgba(90,79,58,0.18);
    border-radius: 12px; padding: 18px 20px; margin: 16px 0; box-shadow: var(--shadow-soft);
  }
  .trCard .trLabel {
    font-family: 'Special Elite', monospace; font-size: 12px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 6px;
  }
  .trCard .trText { font-family: 'Cormorant Garamond', serif; font-size: var(--tr-font, 26px); color: var(--ink); line-height: 1.35; }
  .trSize { display:flex; align-items:center; justify-content:center; gap:10px; margin: 4px 0 0; color: var(--ink-soft); font-size:14px; font-style:italic; }
  .trSize button { width:40px; height:40px; border-radius:50%; border:1.5px solid rgba(90,79,58,0.35); background:transparent; color:var(--ink); cursor:pointer; font-family:'Cormorant Garamond',serif; line-height:1; }
  .trSize button:active { background: rgba(0,0,0,0.06); }
  .trSize .lg { font-size:23px; font-weight:600; } .trSize .sm { font-size:15px; }
  .trCard.trHeard { opacity: 0.75; }
  .trCard.trHeard .trText { font-size: 20px; }
  #trResults { margin-top: 22px; }
  .trError { color: var(--accent); text-align: center; font-style: italic; margin-top: 14px; }
  .trUnsupported { text-align:center; color: var(--ink-soft); margin-top: 20px; }
</style>
</head>
<body>
<div class="paper">

  <a href="private.html" class="backLink">← back to logistics</a>

  <div id="gate" class="lockGate">
    <h2>Translator</h2>
    <p>Speak French, Spanish, or English — read it back translated. For Jason &amp; Rachel.</p>
    <input type="password" id="pw" placeholder="Password" autocomplete="off" inputmode="numeric" />
    <button id="unlockBtn">Unlock</button>
    <div class="lockError" id="lockErr"></div>
  </div>

  <div id="panel" class="privatePanel">
    <div class="trWrap">
      <h1 style="font-family:'Cormorant Garamond',serif;font-size:42px;margin:0 0 4px;text-align:center;">Translator</h1>
      <p style="font-style:italic;color:var(--ink-soft);margin:0 0 14px;text-align:center;">Pick the language you want to read, tap the mic, and speak.</p>
      <p style="text-align:center;margin:0 0 22px;"><a href="live.html" style="color:var(--accent);font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;">Following a conversation or a guide? Try Live mode →</a></p>

      <div class="trLangRow" id="trLangRow">
        <button class="trLang active" data-lang="English">English</button>
        <button class="trLang" data-lang="French">Français</button>
        <button class="trLang" data-lang="Spanish">Español</button>
      </div>

      <div class="trMicWrap">
        <button class="trMic" id="trMic" aria-label="Record">🎙</button>
        <p class="trHint" id="trHint">Tap to speak</p>
      </div>

      <div class="trSize" id="trSize">
        <span>Text size</span>
        <button class="sm" data-step="-1" aria-label="Smaller text">A−</button>
        <button class="lg" data-step="1" aria-label="Bigger text">A+</button>
      </div>

      <div id="trResults"></div>
      <div class="trError" id="trError"></div>
    </div>
  </div>

  <footer class="footer">
    <p class="handwritten">ours · May 2026</p>
  </footer>
</div>

<script src="update-check.js"></script>
<script>
(function(){
  const PASSWORD = '2026';
  const gate = document.getElementById('gate');
  const panel = document.getElementById('panel');
  const pw = document.getElementById('pw');
  const btn = document.getElementById('unlockBtn');
  const err = document.getElementById('lockErr');

  function showPanel() { gate.style.display = 'none'; panel.classList.add('unlocked'); }
  function unlock() {
    if (pw.value === PASSWORD) {
      sessionStorage.setItem('sa-unlocked', '1');
      showPanel();
    } else { err.textContent = 'try again'; pw.value = ''; pw.focus(); }
  }
  btn.addEventListener('click', unlock);
  pw.addEventListener('keydown', e => { if (e.key === 'Enter') unlock(); });
  if (sessionStorage.getItem('sa-unlocked') === '1') { showPanel(); }
  else { setTimeout(() => pw.focus(), 100); }

  // ===== Text size (shared across both translator pages) =====
  const SIZES = [18, 22, 26, 32, 40, 48, 56];
  let sizeIdx = parseInt(localStorage.getItem('sa-tr-size'), 10);
  if (isNaN(sizeIdx)) sizeIdx = 2;
  function applySize(){
    sizeIdx = Math.max(0, Math.min(SIZES.length - 1, sizeIdx));
    document.documentElement.style.setProperty('--tr-font', SIZES[sizeIdx] + 'px');
    localStorage.setItem('sa-tr-size', sizeIdx);
  }
  applySize();
  document.getElementById('trSize').addEventListener('click', e => {
    const b = e.target.closest('button');
    if (!b) return;
    sizeIdx += parseInt(b.dataset.step, 10);
    applySize();
  });

  // ===== Translator =====
  let target = 'English';
  document.getElementById('trLangRow').addEventListener('click', e => {
    const b = e.target.closest('.trLang');
    if (!b) return;
    document.querySelectorAll('.trLang').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    target = b.dataset.lang;
  });

  // The translator engine lives on the Netlify deploy. Call it next-door with a
  // relative path when served from there (or locally); reach across to Netlify
  // when served from anywhere else (e.g. the bespokes.ai mirror, which has no
  // engine) so this works on BOTH addresses.
  const API_BASE = (/(^|\.)netlify\.app$/.test(location.hostname)
                    || location.hostname === 'localhost'
                    || location.hostname === '127.0.0.1')
    ? '' : 'https://shaffers-abroad.netlify.app';

  const mic = document.getElementById('trMic');
  const hint = document.getElementById('trHint');
  const results = document.getElementById('trResults');
  const errOut = document.getElementById('trError');

  let mediaRecorder = null, chunks = [], recording = false;

  if (!navigator.mediaDevices || !window.MediaRecorder) {
    mic.disabled = true;
    errOut.innerHTML = '<div class="trUnsupported">This browser can\'t record audio. Try Safari or Chrome.</div>';
  }

  mic.addEventListener('click', async () => {
    if (recording) { stopRecording(); return; }
    errOut.textContent = '';
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      chunks = [];
      mediaRecorder = new MediaRecorder(stream);
      mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
      mediaRecorder.onstop = () => {
        stream.getTracks().forEach(t => t.stop());
        sendClip(new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' }));
      };
      mediaRecorder.start();
      recording = true;
      mic.classList.add('recording');
      mic.textContent = '⏹';
      hint.textContent = 'Listening… tap to stop';
    } catch {
      errOut.textContent = 'Microphone permission is needed to translate.';
    }
  });

  function stopRecording() {
    if (mediaRecorder && recording) {
      mediaRecorder.stop();
      recording = false;
      mic.classList.remove('recording');
      mic.textContent = '🎙';
      hint.textContent = 'Translating…';
    }
  }

  function sendClip(blob) {
    const reader = new FileReader();
    reader.onloadend = async () => {
      const base64 = String(reader.result).split(',')[1] || '';
      try {
        const r = await fetch(API_BASE + '/api/translate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ audioBase64: base64, mimeType: blob.type, target }),
        });
        const data = await r.json();
        if (!r.ok || data.error) {
          errOut.textContent = data.error || 'Something went wrong. Try again.';
          hint.textContent = 'Tap to speak';
          return;
        }
        renderResult(data);
        hint.textContent = 'Tap to speak again';
      } catch {
        errOut.textContent = 'Could not reach the translator. Check your connection.';
        hint.textContent = 'Tap to speak';
      }
    };
    reader.readAsDataURL(blob);
  }

  function renderResult(data) {
    const heard = data.original ? `<div class="trCard trHeard"><div class="trLabel">Heard</div><div class="trText">${escapeHtml(data.original)}</div></div>` : '';
    const out = `<div class="trCard"><div class="trLabel">In ${escapeHtml(data.target)}</div><div class="trText">${escapeHtml(data.translation)}</div></div>`;
    results.innerHTML = out + heard;
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }
})();
</script>
</body>
</html>
