<head>
<meta charset="UTF-8" />

<meta property="og:title" content="Shaffers Abroad — Things we ate" />
<meta property="og:description" content="Every meal worth remembering, across the whole trip." />
<meta property="og:image" content="https://bespokes.ai/shaffer-europe-2026/images/hero-poster.png" />
<meta property="og:url" content="https://bespokes.ai/shaffer-europe-2026/eaten.html" />
<meta property="og:type" content="article" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:image" content="https://bespokes.ai/shaffer-europe-2026/images/hero-poster.png" />
<link rel="apple-touch-icon" href="images/hero-poster.png" />
<link rel="icon" href="images/hero-poster.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="paper">

  <a href="index.html" class="backLink">← back to the trip</a>

  <header class="noticedHead">
    <div class="noticedKicker">Index · the meals</div>
    <h1 class="noticedTitle">Things we ate</h1>
    <p class="noticedLede">A running list of every meal worth remembering. Across the whole trip.</p>
  </header>

  <section id="eatenList" class="eatenList">
    <div class="noticedEmpty">Nothing logged yet. We'll start adding meals on the road.</div>
  </section>

  <footer class="footer">
    <p class="handwritten">ours · May 2026</p>
  </footer>
</div>

<script src="data.js"></script>
<script src="update-check.js"></script>
<script>
(function(){
  const T = window.TRIP;
  if (!T || !T.days) return;
  const list = document.getElementById('eatenList');
  if (!list) return;

  const daysWithMeals = T.days.filter(d => d.meals && d.meals.length);
  if (!daysWithMeals.length) return;  // keep empty-state

  list.innerHTML = daysWithMeals.map(day => `
    <section class="eatenDay">
      <div class="eatenDayHead">
        <span class="eatenDayCity">${day.city}</span>
        <span class="eatenDayDate">${day.label}</span>
      </div>
      <ul class="eatenMeals">
        ${day.meals.map(m => `
          <li class="eatenMeal">
            <div class="eatenMealLine">
              ${m.place ? `<strong>${m.place}</strong> — ` : ''}
              ${m.dish || ''}
            </div>
            <div class="eatenMealSub">
              ${m.when ? m.when : ''}${m.when && m.cost ? ' · ' : ''}${m.cost ? m.cost : ''}
            </div>
          </li>
        `).join('')}
      </ul>
    </section>
  `).join('');
})();
</script>
</body>
</html>
